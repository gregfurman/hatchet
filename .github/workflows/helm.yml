name: Helm PR auto-creation

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to bump charts to"
        required: true

jobs:
  bump-chart-version:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'release')
    steps:
    - name: Resolve version
      id: resolve-version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          TAG="${{ github.event.inputs.tag }}"
        else
          TAG="${{ github.event.workflow_run.head_branch }}"
        fi
        echo "tag=$TAG" >> $GITHUB_OUTPUT

    - name: Checkout hatchet-charts
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        repository: hatchet-dev/hatchet-charts
        token: ${{ secrets.CHARTS_PR_TOKEN }}

    - name: Update image tags
      run: ./scripts/update-version.sh image-tags "${{ steps.resolve-version.outputs.tag }}"

    - name: Check for changes
      id: verify-changed-files
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi

    - name: Create branch and commit changes
      if: steps.verify-changed-files.outputs.changed == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        BRANCH_NAME="bump-hatchet-${{ steps.resolve-version.outputs.tag }}"
        git checkout -b "$BRANCH_NAME"
        git add .
        git commit -m "chore: bump hatchet image tags to ${{ steps.resolve-version.outputs.tag }}"
        git push origin "$BRANCH_NAME" --force
        echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
      id: create-branch

    - name: Close existing automated-engine-bump PRs
      if: steps.verify-changed-files.outputs.changed == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.CHARTS_PR_TOKEN }}
      run: |
        EXISTING_PRS=$(gh pr list --repo hatchet-dev/hatchet-charts --label "automated-engine-bump" --state open --json number,headRefName --jq ".[] | select(.headRefName != \"${{ steps.create-branch.outputs.branch_name }}\") | .number")

        for pr in $EXISTING_PRS; do
          if [ -n "$pr" ]; then
            echo "Closing existing automated-engine-bump PR #$pr"
            gh pr close $pr --repo hatchet-dev/hatchet-charts --comment "Closing in favor of newer automated-engine-bump PR"
          fi
        done

    - name: Create Pull Request
      if: steps.verify-changed-files.outputs.changed == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.CHARTS_PR_TOKEN }}
      run: |
        gh pr create \
          --repo hatchet-dev/hatchet-charts \
          --title "chore: bump hatchet to ${{ steps.resolve-version.outputs.tag }}" \
          --body "Automated bump for release [\`${{ steps.resolve-version.outputs.tag }}\`](https://github.com/hatchet-dev/hatchet/releases/tag/${{ steps.resolve-version.outputs.tag }})." \
          --head "${{ steps.create-branch.outputs.branch_name }}" \
          --base main \
          --label "automated-engine-bump"
        echo "pr_number=$(gh pr list --repo hatchet-dev/hatchet-charts --head ${{ steps.create-branch.outputs.branch_name }} --json number --jq '.[0].number')" >> $GITHUB_OUTPUT
      id: create-pr

    - name: Request review from triggering author
      if: steps.verify-changed-files.outputs.changed == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.CHARTS_PR_TOKEN }}
      run: |
        AUTHOR="${{ github.actor }}"

        if [ "$AUTHOR" != "github-actions[bot]" ]; then
          gh pr edit "${{ steps.create-branch.outputs.branch_name }}" --repo hatchet-dev/hatchet-charts --add-reviewer "$AUTHOR" || {
            gh pr comment "${{ steps.create-branch.outputs.branch_name }}" --repo hatchet-dev/hatchet-charts --body "@$AUTHOR Please review this autogenerated PR"
          }
          echo "Requested review from $AUTHOR"
        else
          echo "Skipping review request as author is github-actions bot"
        fi
